<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Online</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #menu.hidden {
            display: none;
        }

        #menu h1 {
            color: #4CAF50;
            font-size: 56px;
            margin-bottom: 30px;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
        }

        #menu p {
            color: #ccc;
            font-size: 16px;
            margin: 8px 0;
            max-width: 600px;
            text-align: center;
        }

        #startBtn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #startBtn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10;
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>⛏️ MINECRAFT ONLINE</h1>
        <p style="font-size: 18px; margin-top: 20px;">A 3D Minecraft Clone Built with HTML5</p>
        <p style="margin-top: 30px; color: #aaa;"><strong>HOW TO PLAY:</strong></p>
        <p>WASD = Move around | Space = Jump</p>
        <p>Mouse = Look around (click to enable)</p>
        <p>Left Click = Break blocks | Right Click = Place blocks</p>
        <button id="startBtn" style="margin-top: 50px; padding: 18px 50px; font-size: 22px; font-weight: bold; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s;">▶ START GAME</button>
    </div>

    <div id="crosshair"></div>
    <div id="gameContainer"></div>
    
    <div id="hud">
        <div>📍 Position: <span id="position">0, 0, 0</span></div>
        <div>⏱️ FPS: <span id="fps">60</span></div>
    </div>

    <div id="info">
        <div>Click to enable mouse | Press ESC to show menu</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
